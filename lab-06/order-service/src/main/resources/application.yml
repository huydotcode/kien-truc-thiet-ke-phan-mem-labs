server:
  port: 8083

spring:
  application:
    name: order-service
  
  datasource:
    url: jdbc:h2:mem:orderdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

services:
  user:
    url: ${USER_SERVICE_URL:http://localhost:8081}
  food:
    url: ${FOOD_SERVICE_URL:http://localhost:8082}

logging:
  level:
    com.nhom03: DEBUG
