services:
  web-server:
    image: nginx:alpine
    container_name: web-server
    networks:
      - my-private-network

  client:
    image: alpine
    container_name: client
    command: sh -c "apk add --no-cache curl && sleep infinity"
    networks:
      - my-private-network

networks:
  my-private-network:
    driver: bridge
