server:
  port: 8083

spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/booking_db
    username: ${DB_USERNAME:movieticket}
    password: ${DB_PASSWORD:movieticket}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:movieticket}
    password: ${RABBITMQ_PASSWORD:movieticket}
    listener:
      simple:
        prefetch: 20

jwt:
  secret: ${JWT_SECRET:change-me-in-production-please-use-at-least-32-bytes-long-secret-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.movieticket: INFO
    org.springframework.amqp: WARN
